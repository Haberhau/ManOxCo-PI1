services:
  spark-master:
    image: apache/spark:3.5.3
    container_name: manoxco-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
    ports:
      - "8090:8080"
      - "7078:7077"
    volumes:
      - ../pipelines:/opt/spark-apps
      - ../data:/opt/spark-data
    networks:
      - manoxco-net

  spark-worker-1:
    image: apache/spark:3.5.3
    container_name: manoxco-spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8091
    ports:
      - "8091:8091"
    volumes:
      - ../pipelines:/opt/spark-apps
      - ../data:/opt/spark-data
    depends_on:
      - spark-master
    networks:
      - manoxco-net

  spark-worker-2:
    image: apache/spark:3.5.3
    container_name: manoxco-spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8092
    ports:
      - "8092:8092"
    volumes:
      - ../pipelines:/opt/spark-apps
      - ../data:/opt/spark-data
    depends_on:
      - spark-master
    networks:
      - manoxco-net

  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.3
    container_name: manoxco-jupyter
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    ports:
      - "8889:8888"
    volumes:
      - ../notebooks:/home/jovyan/work
      - ../data:/home/jovyan/data
      - ../pipelines:/home/jovyan/pipelines
    depends_on:
      - spark-master
    networks:
      - manoxco-net

  kafka:
    image: apache/kafka:3.7.0
    container_name: manoxco-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - manoxco-net

  minio:
    image: minio/minio:latest
    container_name: manoxco-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=manoxco
      - MINIO_ROOT_PASSWORD=manoxco123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - manoxco-net

volumes:
  minio-data:

networks:
  manoxco-net:
    driver: bridge
